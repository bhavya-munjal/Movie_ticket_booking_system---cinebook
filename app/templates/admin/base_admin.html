{% extends "base.html" %}
{% block content %}
<div class="admin-layout">
  <div class="sidebar">
    <a href="/admin/" class="{{ 'active' if request.url.path == '/admin/' else '' }}">📊 Dashboard</a>
    <a href="/admin/movies" class="{{ 'active' if 'movies' in request.url.path else '' }}">🎬 Movies</a>
    <a href="/admin/showtimes" class="{{ 'active' if 'showtimes' in request.url.path else '' }}">🕐 Showtimes</a>
    <a href="/admin/bookings" class="{{ 'active' if 'bookings' in request.url.path else '' }}">🎟 Bookings</a>
    <a href="/">← Back to Site</a>
  </div>
  <div class="admin-main">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
