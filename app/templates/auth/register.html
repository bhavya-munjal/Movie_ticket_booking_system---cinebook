{% extends "base.html" %}
{% block title %}Register — CineBook{% endblock %}
{% block content %}
<div class="auth-box">
  <h2>Create Account 🎬</h2>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  <form method="post" action="/auth/register">
    <div class="form-group"><label>Full Name</label><input type="text" name="name" required placeholder="John Doe"></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Min 6 characters" minlength="6"></div>
    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>
  <p class="text-muted text-sm mt-2" style="text-align:center">Already have an account? <a href="/auth/login">Login</a></p>
</div>
{% endblock %}
