{% extends "base.html" %}
{% block title %}Login — CineBook{% endblock %}
{% block content %}
<div class="auth-box">
  <h2>Welcome back 👋</h2>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  <form method="post" action="/auth/login">
    <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
    <button type="submit" class="btn btn-primary btn-block">Login</button>
  </form>
  <p class="text-muted text-sm mt-2" style="text-align:center">Don't have an account? <a href="/auth/register">Register</a></p>
  <div class="divider"></div>
  <p class="text-muted text-sm" style="text-align:center">
    Demo — Admin: <code>admin@cinebook.com</code> / <code>admin123</code><br>
    User: <code>user@cinebook.com</code> / <code>user123</code>
  </p>
</div>
{% endblock %}
